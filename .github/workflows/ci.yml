name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint, typecheck, and unit tests
        run: npm run check

      - name: Coverage gate (source only)
        run: npm run coverage

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t llmtm-ci .

  # Publish the arm64 image the swarm actually runs. Only on push to main, only
  # after tests + the amd64 build validation pass. Uses the built-in GITHUB_TOKEN
  # (no new secrets). This closes the old gap where the image was hand-built and
  # the deployed :latest drifted behind main.
  publish:
    runs-on: ubuntu-latest
    needs: [check, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/vpontual/llm-gateway:latest
            ghcr.io/vpontual/llm-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
