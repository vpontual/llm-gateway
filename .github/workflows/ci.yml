name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint, typecheck, and unit tests
        run: npm run check

      - name: Coverage gate (source only)
        run: npm run coverage

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t llmtm-ci .

  # NOTE: deploy is MANUAL (native arm64 build on a swarm node + docker push +
  # docker service update). A CI `publish` job was tried but removed — it failed
  # two ways: (1) 403, because the GHCR package `vpontual/llm-gateway` isn't linked
  # to this repo (needs a one-time UI grant: package settings → Manage Actions
  # access → add repo → Write); and (2) the QEMU-emulated arm64 `next build`
  # chokes on `node:crypto` in an edge bundle (builds fine natively on the swarm
  # node and on amd64). Re-add auto-publish only after doing the grant AND fixing
  # the emulated arm64 Next build. Until then CI validates (check + amd64 build)
  # and the swarm node is the source of the deployed image.
